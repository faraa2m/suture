<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Suture local LLM orchestration loop</title>
  <desc id="desc">A stitched loop connecting Fable routing, Haiku workers, Sonnet synthesis, and filesystem memory.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101820"/>
      <stop offset="0.55" stop-color="#13251f"/>
      <stop offset="1" stop-color="#1f1b2e"/>
    </linearGradient>
    <linearGradient id="thread" x1="170" y1="258" x2="1030" y2="258" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffcf5a"/>
      <stop offset="0.5" stop-color="#64d2b7"/>
      <stop offset="1" stop-color="#c9a8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .label { font: 700 24px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #f4efe4; }
      .small { font: 600 16px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #b9c7bd; }
      .tiny { font: 600 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #7f9188; }
      .card { fill: rgba(255,255,255,0.055); stroke: rgba(255,255,255,0.18); stroke-width: 1.4; }
      .stitch { stroke: #f4efe4; stroke-width: 5; stroke-linecap: round; }
      .thread { stroke: url(#thread); stroke-width: 10; stroke-linecap: round; stroke-dasharray: 18 18; }
    </style>
  </defs>

  <rect width="1200" height="520" rx="34" fill="url(#bg)"/>
  <path d="M151 259C232 132 395 126 481 232C552 319 475 397 394 368C305 336 322 201 456 160C641 103 803 155 834 258C861 347 774 405 704 363C625 316 669 205 805 184C924 166 1016 206 1050 259" class="thread"/>

  <g filter="url(#shadow)">
    <rect x="80" y="76" width="238" height="158" rx="20" class="card"/>
    <text x="112" y="128" class="label">Fable 5</text>
    <text x="112" y="161" class="small">zero-thought</text>
    <text x="112" y="185" class="small">router</text>
    <path d="M254 128L276 150L254 172" stroke="#ffcf5a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="370" y="292" width="238" height="158" rx="20" class="card"/>
    <text x="402" y="344" class="label">Haiku</text>
    <text x="402" y="377" class="small">cheap workers</text>
    <text x="402" y="401" class="small">tools + edits</text>
    <circle cx="552" cy="348" r="8" fill="#64d2b7"/>
    <circle cx="578" cy="374" r="8" fill="#64d2b7"/>
    <circle cx="526" cy="374" r="8" fill="#64d2b7"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="664" y="76" width="238" height="158" rx="20" class="card"/>
    <text x="696" y="128" class="label">Sonnet</text>
    <text x="696" y="161" class="small">synthesizer</text>
    <text x="696" y="185" class="small">state updates</text>
    <path d="M832 122H858M832 150H874M832 178H850" stroke="#c9a8ff" stroke-width="7" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="940" y="292" width="198" height="158" rx="20" class="card"/>
    <text x="972" y="344" class="label">.ai/</text>
    <text x="972" y="377" class="small">filesystem</text>
    <text x="972" y="401" class="small">as API</text>
    <path d="M1080 340V402M1050 370H1110" stroke="#ffcf5a" stroke-width="7" stroke-linecap="round"/>
  </g>

  <path d="M134 274C191 310 235 312 286 278" class="stitch"/>
  <path d="M436 250C489 218 539 218 592 250" class="stitch"/>
  <path d="M735 260C790 298 844 298 899 260" class="stitch"/>
  <path d="M1006 252C1038 226 1070 226 1102 252" class="stitch"/>

  <text x="80" y="488" class="tiny">route one step -> delegate cheap work -> compress state -> resume from files</text>
</svg>
