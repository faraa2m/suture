name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  scaffold-tests:
    name: scaffold-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run scaffold tests
        run: ./tests/test-ai-scaffold.sh
