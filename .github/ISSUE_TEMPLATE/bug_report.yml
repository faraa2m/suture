name: Bug report
description: Report a reproducible scaffold, hook, or documentation problem.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide exact commands and the target harness if relevant.
      placeholder: |
        ./bin/ai-scaffold --target /tmp/example --tool codex --skills skip
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, agent harness, and relevant CLI versions.
