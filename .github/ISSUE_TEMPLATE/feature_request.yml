name: Feature request
description: Propose a focused improvement to the orchestration scaffold.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: Preserves zero runtime dependencies.
        - label: Keeps state in Markdown or plain filesystem artifacts.
        - label: Works across more than one harness, or is clearly adapter-specific.
